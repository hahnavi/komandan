name: Build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v7

      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Check formatting
        run: cargo fmt --check
      - name: Build
        run: cargo build --verbose

      - name: Setup SSH for tests
        env:
          USER_TEST: usertest
        run: |
          sudo service ssh start
          mkdir ${HOME}/.ssh
          ssh-keyscan -H localhost | tee -a ${HOME}/.ssh/known_hosts
          ssh-keygen -t ed25519 -N "" -f ${HOME}/.ssh/id_ed25519
          sudo useradd -m -d /home/${USER_TEST} -N ${USER_TEST}
          sudo usermod -a -G sudo ${USER_TEST}
          echo '%sudo ALL=(ALL) NOPASSWD:ALL' | sudo tee /etc/sudoers.d/sudo-nopasswd
          sudo -u ${USER_TEST} mkdir /home/${USER_TEST}/.ssh
          cat ${HOME}/.ssh/id_ed25519.pub | sudo -u ${USER_TEST} tee -a /home/${USER_TEST}/.ssh/authorized_keys
          sudo chmod 700 /home/${USER_TEST}/.ssh
          sudo chmod 600 /home/${USER_TEST}/.ssh/authorized_keys
          echo "127.0.0.1 localhost2" | sudo tee -a /etc/hosts > /dev/null

      - name: Run tests
        env:
          KOMANDAN_SSH_TEST: "1"
          # Enables the subset of SSH integration tests that reach out to
          # external hosts (test.rebex.net). Coverage CI deliberately omits
          # this flag so it only exercises the localhost SSH path.
          KOMANDAN_SSH_EXTERNAL_TEST: "1"
          KOMANDAN_SSH_PORT: "22"
        run: cargo test --all-targets --no-fail-fast

  clippy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust components
        run: rustup component add clippy
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  scoped-roles:
    name: scoped-role matrix (spec §11.3)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run scoped-role integration tests
        # Synthetic fixtures mimicking geerlingguy.docker / geerlingguy.nginx /
        # dev-sec.ssh-hardening; exercises the reuse + gap-file executors
        # (apt, file, copy, template, systemd, lineinfile, blockinfile) under
        # realistic role orchestration (handlers/notify, loops, when).
        run: cargo test -p komandan-playbook --test scoped_roles -- --nocapture

  real-roles:
    name: real-world role coverage (spec §11.3)
    runs-on: ubuntu-22.04
    # Real upstream roles drift over time and may introduce patterns komandan
    # does not yet parse; keep this non-blocking until the matrix stabilizes.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust components
        run: rustup component add clippy
      - name: Build komandan binary + playbook plugin
        # The integration test exercises the library directly; the analysis
        # script shells out to the `komandan` host binary, which discovers
        # `libkomandan_playbook.so` from $KOMANDAN_PLUGIN_DIR.
        run: cargo build -p komandan -p komandan-playbook
      - name: Stage plugin for the host
        run: |
          mkdir -p "$HOME/.config/komandan/plugins"
          cp target/debug/libkomandan_playbook.so "$HOME/.config/komandan/plugins/" 2>/dev/null || true
      - name: Run real-role integration tests
        # Clones geerlingguy.docker / geerlingguy.nginx / dev-sec.ssh-hardening
        # from GitHub, parses every tasks/handlers file, and asserts the
        # supported-module coverage stays above the spec threshold. The
        # `--skip-unsupported` path drives a check-mode execute() to a PLAY
        # RECAP for each role.
        env:
          KOMANDAN_TEST_REAL_ROLES: "1"
        run: cargo test -p komandan-playbook --test real_roles -- --nocapture --test-threads=1
      - name: Run analysis script
        # Standalone shell harness: clones the same roles, runs `komandan
        # playbook --syntax-check` / `--list-tasks --skip-unsupported` against
        # each, and prints a per-role module coverage summary.
        run: scripts/analyze-real-roles.sh


  doc:
    name: cargo doc
    runs-on: ubuntu-22.04
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - name: Cache cargo dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo doc
        run: cargo doc --no-deps --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-22.04
    # Non-blocking until existing advisories are triaged; remove
    # continue-on-error to make it a hard gate once clean (REFACTOR_PLAN.md 6.2).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@cargo-audit
      - name: cargo audit
        run: cargo audit

name: Build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Check formatting
        run: cargo fmt --check
      - name: Build
        run: cargo build --verbose

      - name: Setup SSH for tests
        env:
          USER_TEST: usertest
        run: |
          sudo service ssh start
          mkdir ${HOME}/.ssh
          ssh-keyscan -H localhost | tee -a ${HOME}/.ssh/known_hosts
          ssh-keygen -t ed25519 -N "" -f ${HOME}/.ssh/id_ed25519
          sudo useradd -m -d /home/${USER_TEST} -N ${USER_TEST}
          sudo usermod -a -G sudo ${USER_TEST}
          echo '%sudo ALL=(ALL) NOPASSWD:ALL' | sudo tee /etc/sudoers.d/sudo-nopasswd
          sudo -u ${USER_TEST} mkdir /home/${USER_TEST}/.ssh
          cat ${HOME}/.ssh/id_ed25519.pub | sudo -u ${USER_TEST} tee -a /home/${USER_TEST}/.ssh/authorized_keys
          sudo chmod 700 /home/${USER_TEST}/.ssh
          sudo chmod 600 /home/${USER_TEST}/.ssh/authorized_keys
          echo "127.0.0.1 localhost2" | sudo tee -a /etc/hosts > /dev/null

      - name: Run tests
        env:
          KOMANDAN_SSH_TEST: "1"
        run: cargo test --all-targets --no-fail-fast

  clippy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Install Rust components
        run: rustup component add clippy
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  doc:
    name: cargo doc
    runs-on: ubuntu-22.04
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo doc
        run: cargo doc --no-deps --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-22.04
    # Non-blocking until existing advisories are triaged; remove
    # continue-on-error to make it a hard gate once clean (REFACTOR_PLAN.md 6.2).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      - name: cargo audit
        run: cargo audit

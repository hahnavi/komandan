[package]
name = "komandan"
version = "0.0.2"
authors = ["Abdul Munif Hanafi"]
license = "MIT"
edition = "2024"

[features]
vendored-openssl = ["http-klien/vendored-openssl", "ssh2/vendored-openssl"]

[dependencies]
anyhow = "1.0.100"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5.53", features = ["derive"] }
http-klien = { git = "https://github.com/hahnavi/http-klien-rs", branch = "main" }
lettre = { version = "0.11", features = ["smtp-transport", "builder"] }
minijinja = { version = "2.14.0", features = ["loader", "json"] }
mlua = { version = "0.11.5", features = [
    "anyhow",
    "luajit",
    "macros",
    "serialize",
    "vendored",
] }
rand = "0.9.2"
rayon = "1.11.0"
regex = "1.12.2"
reqwest = { version = "0.12.26", features = ["json"] }
rustyline = "17.0.2"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
ssh2 = "0.9.5"
thiserror = "2.0.17"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "macros"] }
url = "2.5.7"

[dev-dependencies]
tempfile = "3.23.0"
mockall = "0.14.0"
proptest = "1.9.0"
wiremock = "0.6.5"

[profile.release]
lto = "fat"
strip = "symbols"

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
enum_glob_use = "deny"
pedantic = "deny"
nursery = "deny"
unwrap_used = "deny"
expect_used = "deny"
